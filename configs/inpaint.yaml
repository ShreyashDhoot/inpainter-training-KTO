model:
  base_model: runwayml/stable-diffusion-inpainting
  hf_dataset_repo: ShreyashDhoot/dataset_latents_VAE
  use_lora: true
  lora:
    r: 64
    lora_alpha: 32
    target_modules: ["to_q", "to_k", "to_v", "to_out.0"]
    lora_dropout: 0.05
    bias: "none"

data:
  train_subdir: train
  val_subdir: val
  cache_dir: ./hf_cache

training:
  lr: 1.0e-3
  warmup_steps: 100
  max_steps: 14000
  max_epochs: 2
  batch_size: 10
  grad_accum_steps: 1
  beta: 50.0
  num_workers: 5
  log_every: 10
  save_every: 50
  grad_clip_norm: 1.0
  mixed_precision: fp16

output:
  checkpoint_dir: ./checkpoints
  eval_dir: ./eval_outputs
  eval_seed: 1234
  eval_mask_threshold: 0.5
  eval_invert_mask: false
  eval_num_inference_steps: 25
  eval_guidance_scale: 7.5
  wandb_project: sd-inpaint-kto-safety
  use_wandb: true
  wandb_mode: online  # online, offline, or disabled
  wandb_entity: shreyashdhoot-mit-wpu
  wandb_run_name: null
  wandb_tags: []
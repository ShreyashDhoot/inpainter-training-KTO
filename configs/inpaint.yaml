model:
  base_model: runwayml/stable-diffusion-inpainting
  hf_dataset_repo: ShreyashDhoot/KTO-latents
  use_lora: true
  lora:
    r: 16
    lora_alpha: 16
    target_modules: ["to_q", "to_k", "to_v", "to_out.0"]
    lora_dropout: 0.05
    bias: "none"

data:
  train_subdir: train
  val_subdir: val
  cache_dir: ./hf_cache

training:
  lr: 1.0e-4
  warmup_steps: 250
  max_steps: 1000
  max_epochs: 2
  batch_size: 32
  grad_accum_steps: 1
  beta: 10.0
  num_workers: 16
  log_every: 50
  save_every: 250
  grad_clip_norm: 1.0
  mixed_precision: fp16


output:
  checkpoint_dir: ./checkpoints
  eval_dir: ./eval_outputs
  eval_seed: 1234
  eval_mask_threshold: 0.5
  eval_invert_mask: false
  eval_num_inference_steps: 25
  eval_guidance_scale: 7.5
  wandb_project: sd-inpaint-kto-safety
  use_wandb: true
  wandb_mode: online  # online, offline, or disabled
  wandb_entity: shreyashdhoot-mit-wpu
  wandb_run_name: null
  wandb_tags: []
  plot_metrics: true
  metrics_plot_dir: ./eval_outputs/metrics_plots
  plot_smoothing_window: 5
model:
  base_model: runwayml/stable-diffusion-inpainting
  hf_dataset_repo: ShreyashDhoot/dataset_latents_VAE

data:
  train_subdir: train
  val_subdir: val
  cache_dir: ./hf_cache

training:
  lr: 1.0e-5
  warmup_steps: 100
  max_steps: 5000
  batch_size: 4
  grad_accum_steps: 4
  beta: 0.1
  num_workers: 0
  log_every: 50
  save_every: 500
  grad_clip_norm: 1.0
  mixed_precision: fp16

output:
  checkpoint_dir: ./checkpoints
  eval_dir: ./eval_outputs
  wandb_project: sd-inpaint-kto-safety